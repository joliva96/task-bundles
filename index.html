/* ─── RESET ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--body);
  background: var(--wood);
  color: var(--text-dark);
  user-select: none;
  -webkit-user-select: none;
}

/* ─── PIXEL BORDER MIXIN ─────────────────────────────── */
.pixel-border {
  border: 3px solid var(--wood-dk);
  box-shadow: 3px 3px 0 var(--wood-dk), inset 1px 1px 0 rgba(255,255,255,0.3);
  image-rendering: pixelated;
}

/* ─── SCREENS ────────────────────────────────────────── */
.screen {
  display: none;
  position: fixed;
  inset: 0;
  flex-direction: column;
  background: var(--parchment);
  overflow: hidden;
}
.screen.active { display: flex; }

/* ─── TOP BAR ────────────────────────────────────────── */
.topbar {
  background: var(--wood);
  padding: 12px 16px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 4px solid var(--wood-dk);
  flex-shrink: 0;
  box-shadow: 0 2px 0 var(--wood-dk);
  min-height: 56px;
}
.topbar-title {
  font-family: var(--pixel);
  font-size: 11px;
  color: var(--gold-lt);
  text-shadow: 2px 2px 0 var(--wood-dk);
  line-height: 1.4;
  letter-spacing: 0.5px;
}
.topbar-sub {
  font-family: var(--pixel);
  font-size: 7px;
  color: var(--parchment-dk);
  display: block;
  margin-top: 3px;
  letter-spacing: 0.5px;
}
.icon-btn {
  background: var(--wood-lt);
  border: 2px solid var(--wood-dk);
  color: var(--parchment);
  font-size: 18px;
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: var(--shadow);
  border-radius: var(--radius);
  flex-shrink: 0;
  transition: transform 0.1s, box-shadow 0.1s;
}
.icon-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--wood-dk); }

/* ─── SCROLL AREA ────────────────────────────────────── */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 14px 12px 80px;
  -webkit-overflow-scrolling: touch;
}

/* ─── TOGGLE TABS ────────────────────────────────────── */
.toggle-tabs {
  display: flex;
  background: var(--wood-dk);
  padding: 4px;
  gap: 4px;
  flex-shrink: 0;
  border-bottom: 3px solid var(--wood-dk);
}
.tab-btn {
  flex: 1;
  font-family: var(--pixel);
  font-size: 8px;
  padding: 8px 4px;
  background: var(--wood-lt);
  color: var(--parchment-dk);
  border: 2px solid var(--wood-dk);
  cursor: pointer;
  border-radius: var(--radius);
  letter-spacing: 0.3px;
  transition: all 0.1s;
  text-align: center;
  line-height: 1.6;
}
.tab-btn.active {
  background: var(--gold);
  color: var(--wood-dk);
  box-shadow: var(--shadow);
}

/* ─── SET CARDS ──────────────────────────────────────── */
.set-card {
  background: var(--cream);
  border: 3px solid var(--wood);
  border-radius: var(--radius);
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.1s;
}
.set-card:active { transform: translate(1px,1px); }
.set-card-header {
  background: var(--wood);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.set-card-title {
  font-family: var(--pixel);
  font-size: 9px;
  color: var(--gold-lt);
  text-shadow: 1px 1px 0 var(--wood-dk);
  flex: 1;
  padding-right: 8px;
  line-height: 1.5;
}
.set-card-emoji { font-size: 20px; }
.set-card-body { padding: 10px 14px 12px; }
.set-progress-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.set-progress-bar {
  flex: 1;
  height: 8px;
  background: var(--parchment-dk);
  border: 2px solid var(--wood-lt);
  border-radius: 2px;
  overflow: hidden;
}
.set-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--green-lt));
  transition: width 0.4s ease;
}
.set-progress-text {
  font-family: var(--pixel);
  font-size: 7px;
  color: var(--wood-lt);
  white-space: nowrap;
}
.set-bundle-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.bundle-chip {
  font-family: var(--pixel);
  font-size: 9px;
  padding: 5px 9px;
  background: var(--parchment-dk);
  border: 2px solid var(--wood-lt);
  border-radius: 2px;
  color: var(--wood);
  line-height: 1.8;
}
.bundle-chip.done {
  background: var(--complete-bg);
  border-color: var(--gold);
  color: var(--wood);
}
.bundle-chip.done::before { content: "★ "; }

/* ─── BUNDLE LIST CARDS ──────────────────────────────── */
.bundle-list-card {
  background: var(--cream);
  border: 3px solid var(--wood);

<script>
/* ═══════════════════════════════════════════════════════════════

const SUPABASE_URL  = 'https://inihqhfyzskzyhpnrfbj.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImluaWhxaGZ5enNrenlocG5yZmJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NTY4NTksImV4cCI6MjA5NzIzMjg1OX0.G-SEqGJnGzT8j2CJjCQb8RRUvk1YMG6LFWcVMTzzwPE';

/* ═══════════════════════════════════════════════════════════════
   SUPABASE CLIENT
═══════════════════════════════════════════════════════════════ */
let sb = null;
if (SUPABASE_URL !== 'YOUR_SUPABASE_URL_HERE') {

}

/* ═══════════════════════════════════════════════════════════════
   LOCAL STATE

let sets    = [];   // [{id, name, icon, sort_order}]
let bundles = [];   // [{id, name, icon, set_id, sort_order}]
let tasks   = [];   // [{id, name, note, bundle_id, sort_order, done}]

let currentTab       = 'sets';
let currentBundleId  = null;

/* ═══════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════ */
async function init() {

function loadDemoData() {

async function loadFromSupabase() {
  try {
    const [sRes, bRes, tRes] = await Promise.all([
      sb.from('sets').select('*').order('sort_order'),
      sb.from('bundles').select('*').order('sort_order'),
      sb.from('tasks').select('*').order('sort_order'),
    ]);
    sets    = sRes.data || [];
    bundles = bRes.data || [];
    tasks   = tRes.data || [];
  } catch(e) {
    console.error(e);
    showToast('Could not load data — check Supabase config');
    loadDemoData();
  }
}

/* ═══════════════════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════════════════ */
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
}
function goHome() { renderHome(); showScreen('home'); }
function goSetup() { renderSetup(); showScreen('setup'); }

function openSet(setId) {
  const set = sets.find(s => s.id === setId);
  if (!set) return;
  const bs = setBundles(setId);
  const prog = setProgress(setId);
  const pct = prog.total ? Math.round(prog.done/prog.total*100) : 0;

  document.getElementById('set-detail-title').textContent = set.name;
  document.getElementById('set-detail-icon').textContent  = set.icon;
  document.getElementById('set-detail-progress-fill').style.width = pct + '%';
  document.getElementById('set-detail-progress-text').textContent = prog.done + '/' + prog.total + ' bundles';

  const listEl = document.getElementById('set-bundle-list');
  if (!bs.length) {
    listEl.innerHTML = '<div class="empty-state"><div class="empty-icon">🎁</div><p>No bundles in this set yet.<br>Go to Setup to add some!</p></div>';
  } else {
    listEl.innerHTML = bs.map(b => renderBundleCard(b)).join('');
  }
  showScreen('set');
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-sets').classList.toggle('active', tab==='sets');
  document.getElementById('tab-bundles').classList.toggle('active', tab==='bundles');
  renderHome();
}

/* ═══════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════ */
function bundleTasks(bundleId)  { return tasks.filter(t => t.bundle_id === bundleId); }
function bundleDone(bundleId)   { const t = bundleTasks(bundleId); return t.length > 0 && t.every(t => t.done); }
function setBundles(setId)      { return bundles.filter(b => b.set_id === setId); }
function setProgress(setId)     {
  const bs = setBundles(setId);
  if(!bs.length) return {done:0, total:0};
  const done  = bs.filter(b => bundleDone(b.id)).length;
  return {done, total:bs.length};
}
function bundleProgress(bid)    {
  const t = bundleTasks(bid);
  return {done: t.filter(x=>x.done).length, total: t.length};
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

/* ═══════════════════════════════════════════════════════════════
   RENDER HOME
═══════════════════════════════════════════════════════════════ */
function renderHome() {
  const el = document.getElementById('home-content');

  if (currentTab === 'sets') {
    if (!sets.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><p>No sets yet.<br>Go to Setup to create<br>your first set!</p></div>`;
      return;
    }
    let html = '';
    sets.forEach(set => {
      const bs = setBundles(set.id);
      const prog = setProgress(set.id);
      const pct = prog.total ? Math.round(prog.done/prog.total*100) : 0;
      const chips = bs.map(b =>
        `<span class="bundle-chip ${bundleDone(b.id)?'done':''}" onclick="event.stopPropagation();openBundle('${b.id}')">${b.icon} ${b.name}</span>`
      ).join('');
      html += `
        <div class="set-card" onclick="openSet('${set.id}')">
          <div class="set-card-header">
            <span class="set-card-title">${set.name}</span>
            <span class="set-card-emoji">${set.icon}</span>
          </div>
          <div class="set-card-body">
            <div class="set-progress-row">
              <div class="set-progress-bar"><div class="set-progress-fill" style="width:${pct}%"></div></div>
              <span class="set-progress-text">${prog.done}/${prog.total} bundles</span>
            </div>
            <div class="set-bundle-chips">${chips || '<span class="set-bundle-chips" style="font-family:var(--pixel);font-size:7px;color:var(--wood-lt)">No bundles yet</span>'}</div>
          </div>
        </div>`;
    });
    el.innerHTML = html;
  } else {
    // All bundles flat list
    if (!bundles.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">🎁</div><p>No bundles yet.<br>Go to Setup to add<br>your first bundle!</p></div>`;
      return;
    }
    // Group by set
    let html = '';
    sets.forEach(set => {
      const bs = setBundles(set.id);
      if (!bs.length) return;
      html += `<div class="section-header">${set.icon} ${set.name}</div>`;
      bs.forEach(b => { html += renderBundleCard(b); });
    });
    // Bundles with no set
    const orphans = bundles.filter(b => !b.set_id || !sets.find(s=>s.id===b.set_id));
    if (orphans.length) {
      if (sets.length) html += `<div class="section-header">📋 Uncategorised</div>`;
      orphans.forEach(b => { html += renderBundleCard(b); });
    }
    el.innerHTML = html;
  }
}

function renderBundleCard(b) {
  const prog = bundleProgress(b.id);
  const pct  = prog.total ? Math.round(prog.done/prog.total*100) : 0;
  const done = bundleDone(b.id);
  const set  = sets.find(s=>s.id===b.set_id);
  return `
    <div class="bundle-list-card ${done?'complete':''}" onclick="openBundle('${b.id}')">
      <div class="bundle-card-accent"></div>
      <div class="bundle-card-content">
        <div class="bundle-card-top">
          <div>
            ${set ? `<div class="bundle-card-set-label">${set.name}</div>` : ''}
            <div class="bundle-card-name">${b.name}</div>
          </div>
          <span class="bundle-card-icon">${b.icon}</span>
        </div>
        <div class="bundle-card-progress">
          <div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%"></div></div>
          <span class="mini-progress-text">${prog.done}/${prog.total}</span>
          ${done ? '<span class="star-badge">⭐</span>' : ''}
        </div>
      </div>
    </div>`;
}

/* ═══════════════════════════════════════════════════════════════
   OPEN BUNDLE
═══════════════════════════════════════════════════════════════ */
function openBundle(bundleId) {
  currentBundleId = bundleId;
  renderBundleDetail();
  showScreen('bundle');
}

function renderBundleDetail() {
  const b    = bundles.find(x=>x.id===currentBundleId);
  if (!b) return;
  const set  = sets.find(s=>s.id===b.set_id);
  const ts   = bundleTasks(b.id);
  const prog = bundleProgress(b.id);
  const pct  = prog.total ? Math.round(prog.done/prog.total*100) : 0;
  const done = bundleDone(b.id);

  document.getElementById('bundle-detail-name2').textContent = b.name;
  document.getElementById('bundle-detail-set2').textContent  = set ? `${set.icon} ${set.name}` : '';
  document.getElementById('bundle-detail-icon').textContent  = b.icon;
  document.getElementById('bundle-hero-fill').style.width    = pct + '%';
  document.getElementById('bundle-hero-text').textContent    = `${prog.done}/${prog.total}`;
  document.getElementById('bundle-complete-banner').style.display = done ? 'block' : 'none';

  // Nav buttons
  const allBundles = bundles;
  const idx = allBundles.findIndex(x=>x.id===currentBundleId);
  const prev = allBundles[idx-1];
  const next = allBundles[idx+1];
  const prevBtn = document.getElementById('nav-prev');
  const nextBtn = document.getElementById('nav-next');
  prevBtn.disabled = !prev;
  nextBtn.disabled = !next;
  document.getElementById('nav-prev-label').textContent = prev ? prev.name : 'Start';
  document.getElementById('nav-next-label').textContent = next ? next.name : 'End';

  // Tasks
  const taskEl = document.getElementById('task-list');
  if (!ts.length) {
    taskEl.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>No tasks in this bundle.<br>Edit to add some!</p></div>`;
    return;
  }
  taskEl.innerHTML = ts.map(t => `
    <div class="task-item ${t.done?'done':''}" id="task-${t.id}" onclick="toggleTask('${t.id}')">
      <div class="task-check">${t.done?'✔':''}</div>
      <div style="flex:1">
        <div class="task-label">${t.name}</div>
        ${t.note ? `<div class="task-note">${t.note}</div>` : ''}
      </div>
    </div>`).join('');
}

function navBundle(dir) {
  const idx = bundles.findIndex(x=>x.id===currentBundleId);
  const next = bundles[idx+dir];
  if (next) { currentBundleId = next.id; renderBundleDetail(); }
}

/* ═══════════════════════════════════════════════════════════════
   TOGGLE TASK
═══════════════════════════════════════════════════════════════ */
async function toggleTask(taskId) {
  const task = tasks.find(t=>t.id===taskId);
  if (!task) return;
  task.done = !task.done;

  // Optimistic UI
  const el = document.getElementById(`task-${taskId}`);
  if (el) {
    el.classList.toggle('done', task.done);
    el.querySelector('.task-check').textContent = task.done ? '✔' : '';
  }

  // Update progress bar
  const prog = bundleProgress(currentBundleId);
  const pct  = prog.total ? Math.round(prog.done/prog.total*100) : 0;
  document.getElementById('bundle-hero-fill').style.width = pct + '%';
  document.getElementById('bundle-hero-text').textContent = `${prog.done}/${prog.total}`;

  // Persist
  if (sb) {
    await sb.from('tasks').update({done: task.done}).eq('id', taskId);
  }

  // Check bundle completion
  if (bundleDone(currentBundleId)) {
    document.getElementById('bundle-complete-banner').style.display = 'block';
    triggerBundleCelebration(bundles.find(b=>b.id===currentBundleId));
  } else {
    document.getElementById('bundle-complete-banner').style.display = 'none';
    if (task.done) showToast('Task done! ⭐');
  }

  renderHome(); // keep home in sync
}

const ICONS = ['🎁','🌾','🍳','🧹','🌻','🛒','🔧','📚','💪','🎨','🐾','🚗','🌿','🍀','⭐','🏡','🧺','💡','🎵','🌊','🍎','🧰','📋','🎯','🌙','❤️','🏋️','✂️','🌸','🧁'];

function iconPickerHtml(selectedIcon, name='icon') {
  return `<div class="icon-picker">${ICONS.map(i =>
    `<span class="icon-option ${i===selectedIcon?'selected':''}" onclick="selectIcon(this,'${name}')">${i}</span>`
  ).join('')}</div><input type="hidden" id="field-${name}" value="${selectedIcon||ICONS[0]}"/>`;
}
function selectIcon(el, name) {
  el.closest('.icon-picker').querySelectorAll('.icon-option').forEach(x=>x.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById(`field-${name}`).value = el.textContent.trim();
}

   SETUP SCREEN

  // ── SETS ──
  html += `
    <div class="setup-section">
      <div class="setup-section-head">
        <span class="setup-section-title">📦 Sets</span>
      </div>
      <div class="setup-section-body">`;

    const bs = setBundles(s.id);
    html += `
      <div class="setup-item">

        <div class="setup-item-info">
          <div class="setup-item-name">${s.name}</div>
          <div class="setup-item-meta">${bs.length} bundle${bs.length!==1?'s':''}</div>
        </div>
        <div class="setup-item-actions">
          <button class="btn-sm btn-edit" onclick="openEditSet('${s.id}')">Edit</button>
          <button class="btn-sm btn-delete" onclick="deleteSet('${s.id}')">✕</button>
        </div>
      </div>`;
  });
  html += `<button class="btn-add" onclick="openAddSet()">+ Add Set</button></div></div>`;

  // ── BUNDLES ──
  html += `
    <div class="setup-section">
      <div class="setup-section-head">
        <span class="setup-section-title">🎁 Bundles</span>
      </div>
      <div class="setup-section-body">`;
  bundles.forEach(b => {
    const set = sets.find(s=>s.id===b.set_id);
    const ts  = bundleTasks(b.id);
    html += `
      <div class="setup-item">
        <span class="setup-item-icon">${b.icon}</span>
        <div class="setup-item-info">
          <div class="setup-item-name">${b.name}</div>
          <div class="setup-item-meta">${set?set.name:'No set'} · ${ts.length} task${ts.length!==1?'s':''}</div>
        </div>
        <div class="setup-item-actions">
          <button class="btn-sm btn-edit" onclick="openEditBundle('${b.id}')">Edit</button>
          <button class="btn-sm btn-delete" onclick="deleteBundle('${b.id}')">✕</button>
        </div>
      </div>`;
  });
  html += `<button class="btn-add" onclick="openAddBundle()">+ Add Bundle</button></div></div>`;

  el.innerHTML = html;
}

/* ─── ADD / EDIT SET ──────────────────────────────────────────── */
function openAddSet() {
  openModal('New Set',
    `<div class="field"><label>SET NAME</label><input id="field-name" placeholder="e.g. Kitchen"/></div>
     <div class="field"><label>ICON</label>${iconPickerHtml('📦')}</div>`,
    `<button class="btn-cancel" onclick="closeModal()">Cancel</button>
     <button class="btn-primary" onclick="saveSet()">Save Set</button>`
  );
}
function openEditSet(setId) {
  const s = sets.find(x=>x.id===setId);
  openModal('Edit Set',
    `<input type="hidden" id="field-id" value="${s.id}"/>
     <div class="field"><label>SET NAME</label><input id="field-name" value="${s.name}"/></div>
     <div class="field"><label>ICON</label>${iconPickerHtml(s.icon)}</div>`,
    `<button class="btn-cancel" onclick="closeModal()">Cancel</button>
     <button class="btn-primary" onclick="saveSet()">Save Set</button>`
  );
}
async function saveSet() {
  const id   = (document.getElementById('field-id')||{}).value;
  const name = document.getElementById('field-name').value.trim();
  const icon = document.getElementById('field-icon').value;
  if (!name) { showToast('Name required!'); return; }

  if (id) {
    const s = sets.find(x=>x.id===id);
    s.name = name; s.icon = icon;
    if (sb) await sb.from('sets').update({name,icon}).eq('id',id);
  } else {
    const newSet = {id: uid(), name, icon, sort_order: sets.length};
    sets.push(newSet);
    if (sb) await sb.from('sets').insert(newSet);
  }
  closeModal(); renderSetup(); renderHome();
}
async function deleteSet(setId) {
  showConfirm('📦', 'Delete Set?', 'Bundles inside will become uncategorised.', async () => {
  sets = sets.filter(s=>s.id!==setId);
  bundles.forEach(b => { if(b.set_id===setId) b.set_id = null; });
  if (sb) { await sb.from('sets').delete().eq('id',setId); }
  renderSetup(); renderHome();
  });
}

/* ─── ADD / EDIT BUNDLE ───────────────────────────────────────── */
function openAddBundle() {
  const setOptions = sets.map(s=>`<option value="${s.id}">${s.icon} ${s.name}</option>`).join('');
  openModal('New Bundle',
    `<div class="field"><label>BUNDLE NAME</label><input id="field-name" placeholder="e.g. Pantry Bundle"/></div>
     <div class="field"><label>ICON</label>${iconPickerHtml('🎁')}</div>
     <div class="field"><label>SET</label><select id="field-set"><option value="">-- No set --</option>${setOptions}</select></div>`,
    `<button class="btn-cancel" onclick="closeModal()">Cancel</button>
     <button class="btn-primary" onclick="saveBundle()">Save Bundle</button>`
  );
}
function openEditBundle(bundleId) {
  const b = bundles.find(x=>x.id===bundleId);
  if (!b) return;
  const setOptions = sets.map(s=>`<option value="${s.id}" ${s.id===b.set_id?'selected':''}>${s.icon} ${s.name}</option>`).join('');
  const ts = bundleTasks(bundleId);
  const taskHtml = ts.map(t => `
    <div class="task-edit-item" id="tedit-${t.id}">
      <span>${t.name}${t.note?` <em style="opacity:0.6;font-size:11px">— ${t.note}</em>`:''}</span>
      <button class="btn-sm btn-edit" onclick="openEditTask('${t.id}')">Edit</button>
      <button class="btn-sm btn-delete" onclick="deleteTask('${t.id}')">✕</button>
    </div>`).join('');
  openModal('Edit Bundle',
    `<input type="hidden" id="field-id" value="${b.id}"/>
     <div class="field"><label>BUNDLE NAME</label><input id="field-name" value="${b.name}"/></div>
     <div class="field"><label>ICON</label>${iconPickerHtml(b.icon)}</div>
     <div class="field"><label>SET</label><select id="field-set"><option value="">-- No set --</option>${setOptions}</select></div>
     <div class="field"><label>TASKS</label>${taskHtml || '<p style="font-size:12px;color:var(--wood-lt);margin-bottom:8px">No tasks yet.</p>'}
       <button class="btn-add" style="margin-top:6px" onclick="openAddTask('${b.id}')">+ Add Task</button>
     </div>`,
    `<button class="btn-cancel" onclick="closeModal()">Cancel</button>
     <button class="btn-primary" onclick="saveBundle()">Save</button>`
  );
}
async function saveBundle() {
  const id     = (document.getElementById('field-id')||{}).value;
  const name   = document.getElementById('field-name').value.trim();
  const icon   = document.getElementById('field-icon').value;
  const set_id = document.getElementById('field-set').value || null;
  if (!name) { showToast('Name required!'); return; }

  if (id) {
    const b = bundles.find(x=>x.id===id);
    b.name = name; b.icon = icon; b.set_id = set_id;
    if (sb) await sb.from('bundles').update({name,icon,set_id}).eq('id',id);
  } else {
    const nb = {id:uid(), name, icon, set_id, sort_order: bundles.length};
    bundles.push(nb);
    if (sb) await sb.from('bundles').insert(nb);
  }
  closeModal(); renderSetup(); renderHome();
  if (currentBundleId) renderBundleDetail();
}
async function deleteBundle(bundleId) {
  showConfirm('🎁', 'Delete Bundle?', 'This will also delete all tasks inside it.', async () => {
  tasks   = tasks.filter(t=>t.bundle_id!==bundleId);
  bundles = bundles.filter(b=>b.id!==bundleId);
  if (sb) {
    await sb.from('tasks').delete().eq('bundle_id',bundleId);
    await sb.from('bundles').delete().eq('id',bundleId);
  }
  renderSetup(); renderHome();
  });
}

/* ─── ADD / EDIT TASK ────────────────────────────────────────── */
function openAddTask(bundleId) {
  openModal('New Task',
    `<input type="hidden" id="field-bundle-id" value="${bundleId}"/>
     <div class="field"><label>TASK NAME</label><input id="field-name" placeholder="e.g. Wipe down shelves"/></div>
     <div class="field"><label>NOTE (optional)</label><textarea id="field-note" placeholder="Any extra detail..."></textarea></div>`,
    `<button class="btn-cancel" onclick="openEditBundle(document.getElementById('field-bundle-id').value)">Back</button>
     <button class="btn-primary" onclick="saveTask()">Add Task</button>`
  );
}
function openEditTask(taskId) {
  const t = tasks.find(x=>x.id===taskId);
  openModal('Edit Task',
    `<input type="hidden" id="field-id" value="${t.id}"/>
     <input type="hidden" id="field-bundle-id" value="${t.bundle_id}"/>
     <div class="field"><label>TASK NAME</label><input id="field-name" value="${t.name}"/></div>
     <div class="field"><label>NOTE (optional)</label><textarea id="field-note">${t.note||''}</textarea></div>`,
    `<button class="btn-cancel" onclick="openEditBundle(document.getElementById('field-bundle-id').value)">Back</button>
     <button class="btn-primary" onclick="saveTask()">Save Task</button>`
  );
}
async function saveTask() {
  const id        = (document.getElementById('field-id')||{}).value;
  const bundleId  = document.getElementById('field-bundle-id').value;
  const name      = document.getElementById('field-name').value.trim();
  const note      = (document.getElementById('field-note')||{}).value?.trim() || '';
  if (!name) { showToast('Task name required!'); return; }

  if (id) {
    const t = tasks.find(x=>x.id===id);
    t.name = name; t.note = note;
    if (sb) await sb.from('tasks').update({name,note}).eq('id',id);
  } else {
    const nt = {id:uid(), name, note, bundle_id:bundleId, sort_order:tasks.filter(t=>t.bundle_id===bundleId).length, done:false};
    tasks.push(nt);
    if (sb) await sb.from('tasks').insert(nt);
  }
  openEditBundle(bundleId);
  renderHome();
  if (currentBundleId === bundleId) renderBundleDetail();
}
async function deleteTask(taskId) {
  const t = tasks.find(x=>x.id===taskId);
  if (!t) return;
  showConfirm('📋', 'Delete Task?', `"${t.name}" will be gone for good.`, async () => {
  const bundleId = t.bundle_id;
  tasks = tasks.filter(x=>x.id!==taskId);
  if (sb) await sb.from('tasks').delete().eq('id',taskId);
  openEditBundle(bundleId);
  renderHome();
  if (currentBundleId === bundleId) renderBundleDetail();
  });
}

/* ═══════════════════════════════════════════════════════════════
   LOADING
═══════════════════════════════════════════════════════════════ */
function hideLoading() {
  const el = document.getElementById('loadingScreen');
  el.classList.add('hidden');
  setTimeout(() => el.style.display='none', 600);
}


/* ═══════════════════════════════════════════════════════════════
   CUSTOM CONFIRM
═══════════════════════════════════════════════════════════════ */
function showConfirm(icon, title, msg, onConfirm) {
  document.getElementById('confirm-icon').textContent  = icon;
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent   = msg;
  document.getElementById('confirm-ok-btn').onclick    = () => { closeConfirm(); onConfirm(); };
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('open');
}
function closeConfirmIfBg(e) {
  if (e.target === document.getElementById('confirm-overlay')) closeConfirm();
}

/* ═══════════════════════════════════════════════════════════════
   KICK OFF
═══════════════════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', init);
</script>

<!-- ═══ CONFIRM MODAL ════════════════════════════════════════ -->
<div class="modal-overlay" id="confirm-overlay" onclick="closeConfirmIfBg(event)">
  <div class="modal" style="max-width:320px;">
    <div class="modal-head">
      <div class="modal-title" id="confirm-title">Are you sure?</div>
    </div>
    <div class="modal-body" style="text-align:center;padding:20px 16px 8px;">
      <div style="font-size:36px;margin-bottom:10px;" id="confirm-icon">🗑️</div>
      <p id="confirm-msg" style="font-family:var(--body);font-size:14px;color:var(--wood-lt);line-height:1.5;"></p>
    </div>
    <div class="modal-actions" style="padding:12px 16px 16px;">
      <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn-primary" id="confirm-ok-btn" style="background:var(--danger);">Delete</button>
    </div>
  </div>
</div>
